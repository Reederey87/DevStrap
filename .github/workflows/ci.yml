name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
  schedule:
    # Daily run so post-merge CVEs surface without blocking unrelated PRs (CI-01).
    - cron: "17 6 * * *"

permissions:
  contents: read

jobs:
  spec-drift:
    name: Spec drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Fetch default branch
        run: git fetch origin main --prune
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Check spec drift
        run: go run ./cmd/spec-drift --base origin/main --head HEAD

  lint:
    name: Go lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true
      - name: golangci-lint
        uses: golangci/golangci-lint-action@db582008a42febd596419635a5abc9d9815daa9c # v9.2.1
        with:
          version: v2.12

  test:
    name: Go tests
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    env:
      # Headless CI runners have no usable OS keychain / Secret Service; force
      # the file-backed device-key store so key operations do not block or fail.
      DEVSTRAP_NO_KEYCHAIN: "1"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Check formatting
        run: |
          test -z "$(gofmt -l cmd internal)"
      - name: Guard against vacuous package tests
        run: |
          for pkg in internal/state internal/config internal/cli; do
            test -n "$(find "$pkg" -maxdepth 1 -name '*_test.go')"
          done
      - name: Vet
        run: go vet ./...
      - name: Build
        run: go build ./...
      - name: Test
        run: go test -race -covermode=atomic -coverprofile=coverage.out ./...
      - name: Module hygiene
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

  vuln:
    name: Vulnerability check
    runs-on: ubuntu-latest
    # Non-blocking on per-PR runs so a newly-published CVE does not fail
    # unrelated PRs; the scheduled run is the authoritative gate (CI-01).
    continue-on-error: ${{ github.event_name != 'schedule' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Vulnerability check
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.1.4 ./...
