name: CI

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    # Daily run so post-merge CVEs surface without blocking unrelated PRs (CI-01).
    - cron: "17 6 * * *"

concurrency:
  # Key PR runs by PR NUMBER, not head_ref: two fork PRs sharing a branch name
  # must never cancel each other (CodeRabbit, PR #68). Non-PR runs key by ref.
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  spec-drift:
    name: Spec drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Fetch default branch
        run: git fetch origin main --prune
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Check spec drift
        # AD-8: fork PRs get advisory mode — findings surface as warning
        # annotations instead of failing the job, since the maintainer
        # completes work-log/ledger bookkeeping at merge. Same-repo PRs and
        # pushes (including maintainer-authored PRs) stay blocking.
        run: go run ./cmd/spec-drift --base origin/main --head HEAD ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository && '--advisory' || '' }}

  lint:
    name: Go lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true
      - name: golangci-lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          version: v2.12
      - name: ShellCheck installer
        run: shellcheck scripts/install.sh

  installer-smoke:
    name: Installer smoke (${{ matrix.os }})
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: sigstore/cosign-installer@f713795cb21599bc4e5c4b58cbad1da852d7eeb9 # v3
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Install slsa-verifier
        # SLSA verification is fail-closed in the installer (P7-QUAL-02), so the
        # positive smoke needs the verifier present; pinned via the module proxy.
        run: go install github.com/slsa-framework/slsa-verifier/v2/cli/slsa-verifier@v2.7.1
      - name: Resolve latest release
        id: release
        run: |
          redirect=$(curl -fsSLI -o /dev/null -w '%{url_effective}' https://github.com/Reederey87/DevStrap/releases/latest)
          version=${redirect##*/}
          case "$version" in v*) ;; *) echo "could not resolve latest release from $redirect" >&2; exit 1 ;; esac
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - name: Install latest release with verified signature and checksum
        env:
          DEVSTRAP_VERSION: ${{ steps.release.outputs.version }}
          DEVSTRAP_INSTALL_DIR: ${{ runner.temp }}/bin
        run: |
          sh scripts/install.sh
          "$RUNNER_TEMP/bin/devstrap" version
      - name: Refuse installation without cosign
        if: matrix.os == 'ubuntu-latest'
        env:
          DEVSTRAP_VERSION: ${{ steps.release.outputs.version }}
          DEVSTRAP_INSTALL_DIR: ${{ runner.temp }}/no-cosign-bin
        run: |
          # Assert the refusal happens for the RIGHT reason — an unrelated
          # earlier failure (bad version, download error) must not pass this.
          if out=$(PATH=/usr/bin:/bin sh scripts/install.sh 2>&1); then
            echo "installer unexpectedly succeeded without cosign" >&2
            exit 1
          fi
          printf '%s\n' "$out"
          printf '%s' "$out" | grep -q "cosign not found" || {
            echo "installer failed for a reason other than missing cosign" >&2
            exit 1
          }

  test:
    name: Go tests
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    env:
      # Headless CI runners have no usable OS keychain / Secret Service; force
      # the file-backed device-key store so key operations do not block or fail.
      DEVSTRAP_NO_KEYCHAIN: "1"
      # Run the real kernel-enforcement tests: Seatbelt on macos-latest and
      # bubblewrap on ubuntu-latest. Without them the sandbox's central
      # guarantee has no CI coverage.
      DEVSTRAP_SANDBOX_E2E: "1"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Check formatting
        run: |
          test -z "$(gofmt -l cmd internal)"
      - name: Guard against vacuous package tests
        run: |
          for pkg in internal/state internal/config internal/cli; do
            test -n "$(find "$pkg" -maxdepth 1 -name '*_test.go')"
          done
      - name: Vet
        run: go vet ./...
      - name: Build
        run: go build ./...
      - name: Install bubblewrap (Linux sandbox E2E)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update && sudo apt-get install -y bubblewrap
          # ubuntu-24.04 restricts unprivileged user namespaces via AppArmor;
          # the apt bubblewrap package ships a permitting profile, but pin the
          # sysctl against runner-image drift so the E2E never silently skips.
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true
          # Fail HERE (loudly) if bwrap can't actually sandbox on this runner —
          # the enforcement test skips when Available() fails, and a silent
          # skip would mask regressions. Mirror the adapter's probe fallback:
          # --disable-userns first, plain userns if the flag is unsupported.
          bwrap --unshare-user --disable-userns --unshare-pid --ro-bind / / --proc /proc --dev /dev true \
            || bwrap --unshare-user --unshare-pid --ro-bind / / --proc /proc --dev /dev true
      - name: Landlock runner probe (hard fail) + helper smoke
        if: matrix.os == 'ubuntu-latest'
        run: |
          # The landlock enforcement test skips when Available() fails — fail
          # HERE (loudly) if this runner's kernel cannot enforce Landlock so a
          # silent skip can't mask regressions. Doubles as a real-binary smoke
          # of the hidden sandbox-helper re-exec shim.
          go build -o "$RUNNER_TEMP/devstrap" ./cmd/devstrap
          spec="{\"WorktreeDir\":\"$PWD\",\"TmpDir\":\"$RUNNER_TEMP\"}"
          "$RUNNER_TEMP/devstrap" sandbox-helper --spec "$spec" -- /usr/bin/true
          if "$RUNNER_TEMP/devstrap" sandbox-helper --spec "$spec" -- /usr/bin/touch "$HOME/landlock-denied-probe"; then
            echo "landlock did not confine writes outside the worktree"; exit 1
          fi
          test ! -e "$HOME/landlock-denied-probe"
      - name: Test
        run: go test -race -covermode=atomic -coverprofile=coverage.out ./...
      - name: Fuzz smoke (Decide convergence property)
        # P4-QUAL-02: run the rapid convergence property under the coverage-guided
        # fuzzer for a short, fixed budget so a regression that breaks strong
        # eventual consistency is caught by mutation, not only the seeded rapid
        # checks. Linux-only (the property is OS-independent; no need to double it
        # on the macOS runner).
        if: matrix.os == 'ubuntu-latest'
        run: go test -run=^$ -fuzz=FuzzDecideConvergence -fuzztime=30s ./internal/sync/
      - name: Coverage floor
        # P5-QUAL-04: consume the coverage profile instead of writing and
        # discarding it. Gate at a conservative floor so under-tested new code
        # (run-loop, draft, materialize variants) can't silently drop coverage.
        run: |
          total=$(go tool cover -func=coverage.out | tail -1 | awk '{print $3}' | tr -d '%')
          echo "total coverage: ${total}%"
          awk -v t="$total" 'BEGIN { if (t+0 < 50.0) { printf("coverage %.1f%% is below the 50%% floor\n", t); exit 1 } }'
      - name: Module hygiene
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

  vuln:
    name: Vulnerability check
    runs-on: ubuntu-latest
    # Non-blocking on per-PR runs so a newly-published CVE does not fail
    # unrelated PRs; the scheduled run is the authoritative gate (CI-01).
    continue-on-error: ${{ github.event_name != 'schedule' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Vulnerability check
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.1.4 ./...

  minio-conformance:
    name: MinIO hub conformance
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Start MinIO
        run: docker run -d --name minio -p 9000:9000 minio/minio@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e server /data # RELEASE.2025-09-07T16-13-09Z
      - name: Wait for MinIO
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:9000/minio/health/live >/dev/null; then exit 0; fi
            sleep 2
          done
          docker logs minio
          exit 1
      - name: Run conformance test
        env:
          DEVSTRAP_HUB_S3_ENDPOINT: http://localhost:9000
          DEVSTRAP_HUB_S3_ACCESS_KEY_ID: minioadmin
          DEVSTRAP_HUB_S3_SECRET_ACCESS_KEY: minioadmin
          DEVSTRAP_HUB_S3_BUCKET: devstrap-test
        run: go test ./internal/hub/ -run TestR2MinIOConformance -v
