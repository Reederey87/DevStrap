name: CI

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    # Daily run so post-merge CVEs surface without blocking unrelated PRs (CI-01).
    - cron: "17 6 * * *"

concurrency:
  # Key PR runs by PR NUMBER, not head_ref: two fork PRs sharing a branch name
  # must never cancel each other (CodeRabbit, PR #68). Non-PR runs key by ref.
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  spec-drift:
    name: Spec drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Fetch default branch
        run: git fetch origin main --prune
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Check spec drift
        # AD-8: fork PRs get advisory mode — findings surface as warning
        # annotations instead of failing the job, since the maintainer
        # completes work-log/ledger bookkeeping at merge. Same-repo PRs and
        # pushes (including maintainer-authored PRs) stay blocking.
        run: go run ./cmd/spec-drift --base origin/main --head HEAD ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository && '--advisory' || '' }}

  lint:
    name: Go lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true
      - name: golangci-lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          version: v2.12
      - name: ShellCheck installer
        run: shellcheck scripts/install.sh

  installer-smoke:
    name: Installer smoke (${{ matrix.os }})
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: sigstore/cosign-installer@f713795cb21599bc4e5c4b58cbad1da852d7eeb9 # v3
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Install slsa-verifier
        # SLSA verification is fail-closed in the installer (P7-QUAL-02), so the
        # positive smoke needs the verifier present; pinned via the module proxy.
        run: go install github.com/slsa-framework/slsa-verifier/v2/cli/slsa-verifier@v2.7.1
      - name: Resolve latest release
        id: release
        run: |
          redirect=$(curl -fsSLI -o /dev/null -w '%{url_effective}' https://github.com/Reederey87/DevStrap/releases/latest)
          version=${redirect##*/}
          case "$version" in v*) ;; *) echo "could not resolve latest release from $redirect" >&2; exit 1 ;; esac
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - name: Install latest release with verified signature and checksum
        env:
          DEVSTRAP_VERSION: ${{ steps.release.outputs.version }}
          DEVSTRAP_INSTALL_DIR: ${{ runner.temp }}/bin
        run: |
          sh scripts/install.sh
          "$RUNNER_TEMP/bin/devstrap" version
      - name: Refuse installation without cosign
        if: matrix.os == 'ubuntu-latest'
        env:
          DEVSTRAP_VERSION: ${{ steps.release.outputs.version }}
          DEVSTRAP_INSTALL_DIR: ${{ runner.temp }}/no-cosign-bin
        run: |
          # Assert the refusal happens for the RIGHT reason — an unrelated
          # earlier failure (bad version, download error) must not pass this.
          if out=$(PATH=/usr/bin:/bin sh scripts/install.sh 2>&1); then
            echo "installer unexpectedly succeeded without cosign" >&2
            exit 1
          fi
          printf '%s\n' "$out"
          printf '%s' "$out" | grep -q "cosign not found" || {
            echo "installer failed for a reason other than missing cosign" >&2
            exit 1
          }

  test:
    name: Go tests
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    env:
      # Headless CI runners have no usable OS keychain / Secret Service; force
      # the file-backed device-key store so key operations do not block or fail.
      DEVSTRAP_NO_KEYCHAIN: "1"
      # Run the real kernel-enforcement tests: Seatbelt on macos-latest and
      # bubblewrap on ubuntu-latest. Without them the sandbox's central
      # guarantee has no CI coverage.
      DEVSTRAP_SANDBOX_E2E: "1"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Check formatting
        run: |
          test -z "$(gofmt -l cmd internal)"
      - name: Guard against vacuous package tests
        run: |
          for pkg in internal/state internal/config internal/cli; do
            test -n "$(find "$pkg" -maxdepth 1 -name '*_test.go')"
          done
      - name: Vet
        run: go vet ./...
      - name: Build
        run: go build ./...
      - name: Install bubblewrap (Linux sandbox E2E)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update && sudo apt-get install -y bubblewrap
          # ubuntu-24.04 restricts unprivileged user namespaces via AppArmor;
          # the apt bubblewrap package ships a permitting profile, but pin the
          # sysctl against runner-image drift so the E2E never silently skips.
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true
          # Fail HERE (loudly) if bwrap can't actually sandbox on this runner —
          # the enforcement test skips when Available() fails, and a silent
          # skip would mask regressions. Mirror the adapter's probe fallback:
          # --disable-userns first, plain userns if the flag is unsupported.
          bwrap --unshare-user --disable-userns --unshare-pid --ro-bind / / --proc /proc --dev /dev true \
            || bwrap --unshare-user --unshare-pid --ro-bind / / --proc /proc --dev /dev true
      - name: Landlock runner probe (hard fail) + helper smoke
        if: matrix.os == 'ubuntu-latest'
        run: |
          # The landlock enforcement test skips when Available() fails — fail
          # HERE (loudly) if this runner's kernel cannot enforce Landlock so a
          # silent skip can't mask regressions. Doubles as a real-binary smoke
          # of the hidden sandbox-helper re-exec shim.
          go build -o "$RUNNER_TEMP/devstrap" ./cmd/devstrap
          spec="{\"WorktreeDir\":\"$PWD\",\"TmpDir\":\"$RUNNER_TEMP\"}"
          "$RUNNER_TEMP/devstrap" sandbox-helper --spec "$spec" -- /usr/bin/true
          if "$RUNNER_TEMP/devstrap" sandbox-helper --spec "$spec" -- /usr/bin/touch "$HOME/landlock-denied-probe"; then
            echo "landlock did not confine writes outside the worktree"; exit 1
          fi
          test ! -e "$HOME/landlock-denied-probe"
      - name: Test
        run: go test -race -covermode=atomic -coverprofile=coverage.out ./...
      - name: Fuzz smoke (Decide convergence property)
        # P4-QUAL-02: run the rapid convergence property under the coverage-guided
        # fuzzer for a short, fixed budget so a regression that breaks strong
        # eventual consistency is caught by mutation, not only the seeded rapid
        # checks. Linux-only (the property is OS-independent; no need to double it
        # on the macOS runner).
        if: matrix.os == 'ubuntu-latest'
        run: go test -run=^$ -fuzz=FuzzDecideConvergence -fuzztime=30s ./internal/sync/
      - name: Fuzz smoke (env-file parser)
        if: matrix.os == 'ubuntu-latest'
        run: go test -run '^$' -fuzz '^FuzzParseBytes$' -fuzztime=30s ./internal/envfile/
      - name: Fuzz smoke (ignore compiler)
        if: matrix.os == 'ubuntu-latest'
        run: go test -run '^$' -fuzz '^FuzzCompile$' -fuzztime=30s ./internal/ignore/
      - name: Coverage floor
        # P5-QUAL-04: consume the coverage profile instead of writing and
        # discarding it. Gate at a conservative floor so under-tested new code
        # (run-loop, draft, materialize variants) can't silently drop coverage.
        run: |
          total=$(go tool cover -func=coverage.out | tail -1 | awk '{print $3}' | tr -d '%')
          echo "total coverage: ${total}%"
          awk -v t="$total" 'BEGIN { if (t+0 < 50.0) { printf("coverage %.1f%% is below the 50%% floor\n", t); exit 1 } }'
      - name: Module hygiene
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

  service-e2e:
    name: Service E2E (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    env:
      DEVSTRAP_NO_KEYCHAIN: "1"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Build
        run: go build -o "$RUNNER_TEMP/devstrap" ./cmd/devstrap
      - name: Install, inspect, and uninstall against the live service manager
        shell: bash
        run: |
          set -euo pipefail

          HOME_DIR="$RUNNER_TEMP/ds-home"
          ROOT_DIR="$RUNNER_TEMP/code"
          HUB_FILE="$RUNNER_TEMP/hub.json"
          STDERR_LOG="$HOME_DIR/logs/run-loop.err.log"
          INSTALL_LOG="$RUNNER_TEMP/service-install.log"
          DEFAULT_CREATED=false

          if [[ "$RUNNER_OS" == "Linux" ]]; then
            LABEL="devstrap-ci-e2e"
            DEFAULT_LABEL="devstrap-run-loop"
            UNIT_FILE="$HOME/.config/systemd/user/$LABEL.service"
            DEFAULT_UNIT_FILE="$HOME/.config/systemd/user/$DEFAULT_LABEL.service"
          else
            LABEL="com.devstrap.ci-e2e"
            DEFAULT_LABEL="com.devstrap.run-loop"
            UNIT_FILE="$HOME/Library/LaunchAgents/$LABEL.plist"
            DEFAULT_UNIT_FILE="$HOME/Library/LaunchAgents/$DEFAULT_LABEL.plist"
          fi

          dump_diagnostics() {
            echo "--- rendered service unit ---" >&2
            if [[ -f "$UNIT_FILE" ]]; then cat "$UNIT_FILE" >&2; else echo "missing: $UNIT_FILE" >&2; fi
            echo "--- service install output ---" >&2
            if [[ -f "$INSTALL_LOG" ]]; then cat "$INSTALL_LOG" >&2; else echo "missing: $INSTALL_LOG" >&2; fi
            echo "--- run-loop stderr ---" >&2
            if [[ -f "$STDERR_LOG" ]]; then tail -50 "$STDERR_LOG" >&2; else echo "missing: $STDERR_LOG" >&2; fi
            if [[ "$RUNNER_OS" == "Linux" ]]; then
              echo "--- systemctl status ---" >&2
              systemctl --user status "$LABEL.service" --no-pager >&2 || true
              echo "--- journalctl ---" >&2
              journalctl --user -u "$LABEL.service" --no-pager | tail -50 >&2 || true
            else
              echo "--- launchctl print ---" >&2
              launchctl print "gui/$(id -u)/$LABEL" >&2 || true
            fi
          }

          cleanup() {
            if [[ "$DEFAULT_CREATED" == true ]]; then
              "$RUNNER_TEMP/devstrap" --home "$HOME_DIR" --root "$ROOT_DIR" service uninstall --label "$DEFAULT_LABEL" >/dev/null 2>&1 || true
            fi
            "$RUNNER_TEMP/devstrap" --home "$HOME_DIR" --root "$ROOT_DIR" service uninstall --label "$LABEL" >/dev/null 2>&1 || true
            if [[ "$RUNNER_OS" == "Linux" ]]; then
              if [[ "$DEFAULT_CREATED" == true ]]; then systemctl --user disable --now "$DEFAULT_LABEL.service" >/dev/null 2>&1 || true; fi
              systemctl --user disable --now "$LABEL.service" >/dev/null 2>&1 || true
              systemctl --user daemon-reload >/dev/null 2>&1 || true
            else
              if [[ "$DEFAULT_CREATED" == true ]]; then launchctl bootout "gui/$(id -u)/$DEFAULT_LABEL" >/dev/null 2>&1 || true; fi
              launchctl bootout "gui/$(id -u)/$LABEL" >/dev/null 2>&1 || true
            fi
            if [[ "$DEFAULT_CREATED" == true ]]; then rm -f "$DEFAULT_UNIT_FILE"; fi
            rm -f "$UNIT_FILE"
          }
          finish() {
            rc=$?
            trap - EXIT
            if (( rc != 0 )); then dump_diagnostics; fi
            cleanup
            exit "$rc"
          }
          trap finish EXIT

          "$RUNNER_TEMP/devstrap" --home "$HOME_DIR" init "$ROOT_DIR"
          if ! "$RUNNER_TEMP/devstrap" --home "$HOME_DIR" --root "$ROOT_DIR" service install \
            --hub-file "$HUB_FILE" --exec-path "$RUNNER_TEMP/devstrap" \
            --interval 30m --label "$LABEL" 2>"$INSTALL_LOG"; then
            exit 1
          fi
          cat "$INSTALL_LOG" >&2

          status_json=$("$RUNNER_TEMP/devstrap" --home "$HOME_DIR" --root "$ROOT_DIR" service status --label "$LABEL" --json)
          jq -e '.installed == true' <<<"$status_json"

          running=false
          for _ in $(seq 1 30); do
            status_json=$("$RUNNER_TEMP/devstrap" --home "$HOME_DIR" --root "$ROOT_DIR" service status --label "$LABEL" --json)
            if jq -e '.running == true' <<<"$status_json" >/dev/null; then
              running=true
              break
            fi
            sleep 1
          done
          if [[ "$running" != true ]]; then
            echo "service did not report running within 30 seconds: $status_json" >&2
            exit 1
          fi

          if [[ "$RUNNER_OS" == "Linux" ]]; then
            systemctl --user is-active "$LABEL.service" || exit 1
          else
            launchctl print "gui/$(id -u)/$LABEL" >/dev/null || exit 1
          fi

          # A live supervisor is not a working loop: run-loop swallows the
          # first four tick failures, so "running" can mean "failing quietly
          # for 30 minutes". Require an observed first tick with NO tick error
          # — checked BEFORE the doctor twin exists, while this service is the
          # only writer to the shared stderr log (and the only maintenance-
          # lock contender).
          tick_seen=false
          for _ in $(seq 1 30); do
            if [[ -f "$STDERR_LOG" ]] && grep -q "run-loop tick: scan + sync + materialize" "$STDERR_LOG"; then
              tick_seen=true
              break
            fi
            sleep 1
          done
          if [[ "$tick_seen" != true ]]; then
            echo "no run-loop tick observed within 30 seconds" >&2
            exit 1
          fi
          sleep 2
          if grep -q "run-loop tick error" "$STDERR_LOG"; then
            echo "run-loop tick reported an error:" >&2
            grep "run-loop tick error" "$STDERR_LOG" >&2
            exit 1
          fi

          # doctor currently inspects only the OS-default label. Install an
          # isolated twin briefly so the live doctor integration is still
          # asserted while the lifecycle under test keeps its CI-only label.
          default_status=$("$RUNNER_TEMP/devstrap" --home "$HOME_DIR" --root "$ROOT_DIR" service status --label "$DEFAULT_LABEL" --json)
          jq -e '.installed == false' <<<"$default_status"
          DEFAULT_CREATED=true
          "$RUNNER_TEMP/devstrap" --home "$HOME_DIR" --root "$ROOT_DIR" service install \
            --hub-file "$HUB_FILE" --exec-path "$RUNNER_TEMP/devstrap" \
            --interval 30m --label "$DEFAULT_LABEL"
          doctor_out=""
          for _ in $(seq 1 30); do
            doctor_out=$("$RUNNER_TEMP/devstrap" --home "$HOME_DIR" --root "$ROOT_DIR" doctor)
            if grep -q "run-loop service" <<<"$doctor_out" && grep -q "installed and running" <<<"$doctor_out"; then
              break
            fi
            sleep 1
          done
          grep -q "run-loop service" <<<"$doctor_out"
          grep -q "installed and running" <<<"$doctor_out"
          "$RUNNER_TEMP/devstrap" --home "$HOME_DIR" --root "$ROOT_DIR" service uninstall --label "$DEFAULT_LABEL"

          "$RUNNER_TEMP/devstrap" --home "$HOME_DIR" --root "$ROOT_DIR" service uninstall --label "$LABEL"
          status_json=$("$RUNNER_TEMP/devstrap" --home "$HOME_DIR" --root "$ROOT_DIR" service status --label "$LABEL" --json)
          jq -e '.installed == false' <<<"$status_json"
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            if systemctl --user is-active "$LABEL.service"; then
              echo "service is still active after uninstall" >&2
              dump_diagnostics
              exit 1
            fi
          else
            unloaded=false
            for _ in $(seq 1 30); do
              if ! launchctl print "gui/$(id -u)/$LABEL" >/dev/null 2>&1; then
                unloaded=true
                break
              fi
              sleep 1
            done
            [[ "$unloaded" == true ]] || exit 1
          fi

          if [[ "$RUNNER_OS" == "Linux" ]]; then
            "$RUNNER_TEMP/devstrap" --home "$HOME_DIR" --root "$ROOT_DIR" service install \
              --hub-file "$HUB_FILE" --exec-path "$RUNNER_TEMP/devstrap" \
              --interval 30m --label "$LABEL"
            headless_out=$(env -u DBUS_SESSION_BUS_ADDRESS -u XDG_RUNTIME_DIR \
              "$RUNNER_TEMP/devstrap" --home "$HOME_DIR" --root "$ROOT_DIR" \
              service uninstall --label "$LABEL" 2>&1)
            echo "$headless_out"
            [[ ! -e "$UNIT_FILE" ]]
            grep -q "removed the unit file only" <<<"$headless_out"
            systemctl --user disable --now "$LABEL.service" || true
            systemctl --user daemon-reload
          fi

  vuln:
    name: Vulnerability check
    runs-on: ubuntu-latest
    # Non-blocking on per-PR runs so a newly-published CVE does not fail
    # unrelated PRs; the scheduled run is the authoritative gate (CI-01).
    continue-on-error: ${{ github.event_name != 'schedule' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Vulnerability check
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.1.4 ./...

  minio-conformance:
    name: MinIO hub conformance
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Start MinIO
        run: docker run -d --name minio -p 9000:9000 minio/minio@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e server /data # RELEASE.2025-09-07T16-13-09Z
      - name: Wait for MinIO
        run: |
          for _ in $(seq 1 30); do
            if curl -sf http://localhost:9000/minio/health/live >/dev/null; then exit 0; fi
            sleep 2
          done
          docker logs minio
          exit 1
      - name: Run conformance test
        env:
          DEVSTRAP_HUB_S3_ENDPOINT: http://localhost:9000
          DEVSTRAP_HUB_S3_ACCESS_KEY_ID: minioadmin
          DEVSTRAP_HUB_S3_SECRET_ACCESS_KEY: minioadmin
          DEVSTRAP_HUB_S3_BUCKET: devstrap-test
        run: go test ./internal/hub/ -run TestR2MinIOConformance -v
