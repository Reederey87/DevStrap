name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  test:
    name: Go tests
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Check formatting
        run: |
          test -z "$(gofmt -l cmd internal)"
      - name: Test
        run: go test ./...
