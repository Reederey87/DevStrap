name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # create the GitHub Release and upload binaries

jobs:
  verify:
    name: Verify tagged commit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    env:
      # Headless CI runners have no usable OS keychain / Secret Service; force
      # the file-backed device-key store so key operations do not block or fail
      # (mirrors ci.yml's test job).
      DEVSTRAP_NO_KEYCHAIN: "1"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Assert tag is on main or a release branch
        # fetch-depth: 0 populates refs/remotes/origin/* for all branches; the
        # refname-anchored match cannot be satisfied by lookalike branches
        # (origin/mainline, origin/main-wip).
        run: |
          if ! git branch -r --format='%(refname)' --contains "$GITHUB_SHA"                | grep -Eq '^refs/remotes/origin/(main|release/.+)$'; then
            echo "::error::tagged commit $GITHUB_SHA is not contained in origin/main or a release/* branch"
            exit 1
          fi
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true
      - run: go vet ./...
      - run: go test -race ./...
      - name: govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.1.4 ./...

  goreleaser:
    name: GoReleaser
    runs-on: ubuntu-latest
    needs: verify
    permissions:
      contents: write # create the GitHub Release and upload binaries
      id-token: write # OIDC token for cosign keyless signing (P4-SEC-05)
    # Carry the built-artifact digests to the provenance job. checksums.txt is
    # already in sha256sum format — exactly the subjects the SLSA generic
    # generator signs (base64-encoded).
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # full history + tags for the changelog
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
      - name: Validate macOS notarization secrets (0-or-5)
        env:
          MACOS_SIGN_P12: ${{ secrets.MACOS_SIGN_P12 }}
          MACOS_SIGN_PASSWORD: ${{ secrets.MACOS_SIGN_PASSWORD }}
          MACOS_NOTARY_KEY: ${{ secrets.MACOS_NOTARY_KEY }}
          MACOS_NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          MACOS_NOTARY_ISSUER_ID: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
        run: |
          names=(
            MACOS_SIGN_P12
            MACOS_SIGN_PASSWORD
            MACOS_NOTARY_KEY
            MACOS_NOTARY_KEY_ID
            MACOS_NOTARY_ISSUER_ID
          )
          set_names=()
          missing_names=()
          for name in "${names[@]}"; do
            if [[ -n "${!name}" ]]; then
              set_names+=("$name")
            else
              missing_names+=("$name")
            fi
          done

          count=${#set_names[@]}
          if (( count != 0 && count != 5 )); then
            printf -v set_list '%s, ' "${set_names[@]}"
            printf -v missing_list '%s, ' "${missing_names[@]}"
            echo "macOS notarization secrets must be set 0-or-5; set: ${set_list%, }; missing: ${missing_list%, }" >&2
            exit 1
          fi
      - name: GoReleaser
        # P4-SEC-05: SHA-pin the one remaining unpinned action in this
        # contents:write release job. The trailing version comment lets
        # Dependabot bump the SHA on new releases.
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Fine-grained PAT scoped to Reederey87/homebrew-devstrap (Contents:
          # Read+Write) — the default GITHUB_TOKEN cannot push to another repo.
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          # Pin the release to the tag that TRIGGERED this run. Without this,
          # GoReleaser derives the current tag from `git tag --points-at HEAD`,
          # and when the documented rc -> stable flow puts two tags on one
          # commit, git's version sort ranks v0.1.0-rc.1 above v0.1.0 — the
          # stable run then rebuilds rc artifacts and fails uploading them onto
          # the existing rc release (observed on the first v0.1.0 attempt).
          GORELEASER_CURRENT_TAG: ${{ github.ref_name }}
          # Dormant notarization (P4-SEC-05 remainder): the validation step
          # above rejects partial configuration, so set all five secrets at
          # once. .goreleaser.yaml still self-enables via isEnvSet on
          # MACOS_SIGN_P12. This Ubuntu job cannot run macOS spctl; the
          # required post-release Gatekeeper check is in RELEASING.md.
          MACOS_SIGN_P12: ${{ secrets.MACOS_SIGN_P12 }}
          MACOS_SIGN_PASSWORD: ${{ secrets.MACOS_SIGN_PASSWORD }}
          MACOS_NOTARY_KEY: ${{ secrets.MACOS_NOTARY_KEY }}
          MACOS_NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          MACOS_NOTARY_ISSUER_ID: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
      - name: Compute provenance subjects
        id: hash
        # checksums.txt is already in sha256sum format — exactly the subjects
        # file the SLSA generic generator expects, base64-encoded.
        run: echo "hashes=$(base64 -w0 dist/checksums.txt)" >> "$GITHUB_OUTPUT"

  provenance:
    name: SLSA provenance
    needs: goreleaser
    permissions:
      actions: read # read the workflow run to record the builder
      id-token: write # sign the provenance via Fulcio (keyless)
      contents: write # upload multiple.intoto.jsonl to the release
    # NOTE: this reusable workflow MUST be referenced by TAG, not SHA —
    # slsa-verifier resolves the builder identity from the tag, and the
    # generator refuses to run from an unexpected ref. Exempt from the repo's
    # SHA-pin convention (P4-SEC-05) for that reason; do not "fix" this in a
    # future pin sweep.
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: ${{ needs.goreleaser.outputs.hashes }}
      upload-assets: true
