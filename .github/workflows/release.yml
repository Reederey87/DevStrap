name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # create the GitHub Release and upload binaries

# One run per tag at a time: the delete-and-re-cut procedure otherwise lets an
# older run's publish job promote a NEWER run's un-smoked draft (tag-name
# TOCTOU). Never cancel a release run mid-flight.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify tagged commit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    env:
      # Headless CI runners have no usable OS keychain / Secret Service; force
      # the file-backed device-key store so key operations do not block or fail
      # (mirrors ci.yml's test job).
      DEVSTRAP_NO_KEYCHAIN: "1"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Assert tag is on main or a release branch
        # fetch-depth: 0 populates refs/remotes/origin/* for all branches; the
        # refname-anchored match cannot be satisfied by lookalike branches
        # (origin/mainline, origin/main-wip).
        run: |
          if ! git branch -r --format='%(refname)' --contains "$GITHUB_SHA"                | grep -Eq '^refs/remotes/origin/(main|release/.+)$'; then
            echo "::error::tagged commit $GITHUB_SHA is not contained in origin/main or a release/* branch"
            exit 1
          fi
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true
      - run: go vet ./...
      - run: go test -race ./...
      - name: govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.1.4 ./...

  goreleaser:
    name: GoReleaser
    runs-on: ubuntu-latest
    needs: verify
    permissions:
      contents: write # create the GitHub Release and upload binaries
      id-token: write # OIDC token for cosign keyless signing (P4-SEC-05)
    # Carry the built-artifact digests to the provenance job. checksums.txt is
    # already in sha256sum format — exactly the subjects the SLSA generic
    # generator signs (base64-encoded).
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
      stable: ${{ steps.release-mode.outputs.stable }}
    steps:
      - name: Detect stable release
        id: release-mode
        env:
          TAG: ${{ github.ref_name }}
        run: |
          stable=false
          if [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            stable=true
            echo "DEVSTRAP_STAGE_ONLY=true" >> "$GITHUB_ENV"
          fi
          echo "stable=$stable" >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # full history + tags for the changelog
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
      - name: Validate macOS notarization secrets (0-or-5)
        env:
          MACOS_SIGN_P12: ${{ secrets.MACOS_SIGN_P12 }}
          MACOS_SIGN_PASSWORD: ${{ secrets.MACOS_SIGN_PASSWORD }}
          MACOS_NOTARY_KEY: ${{ secrets.MACOS_NOTARY_KEY }}
          MACOS_NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          MACOS_NOTARY_ISSUER_ID: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
        run: |
          names=(
            MACOS_SIGN_P12
            MACOS_SIGN_PASSWORD
            MACOS_NOTARY_KEY
            MACOS_NOTARY_KEY_ID
            MACOS_NOTARY_ISSUER_ID
          )
          set_names=()
          missing_names=()
          for name in "${names[@]}"; do
            if [[ -n "${!name}" ]]; then
              set_names+=("$name")
            else
              missing_names+=("$name")
            fi
          done

          count=${#set_names[@]}
          if (( count != 0 && count != 5 )); then
            printf -v set_list '%s, ' "${set_names[@]}"
            printf -v missing_list '%s, ' "${missing_names[@]}"
            echo "macOS notarization secrets must be set 0-or-5; set: ${set_list%, }; missing: ${missing_list%, }" >&2
            exit 1
          fi
      - name: GoReleaser
        # P4-SEC-05: SHA-pin the one remaining unpinned action in this
        # contents:write release job. The trailing version comment lets
        # Dependabot bump the SHA on new releases.
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          distribution: goreleaser
          version: "v2.17.0"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Fine-grained PAT scoped to Reederey87/homebrew-devstrap (Contents:
          # Read+Write) — the default GITHUB_TOKEN cannot push to another repo.
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          # Pin the release to the tag that TRIGGERED this run. Without this,
          # GoReleaser derives the current tag from `git tag --points-at HEAD`,
          # and when the documented rc -> stable flow puts two tags on one
          # commit, git's version sort ranks v0.1.0-rc.1 above v0.1.0 — the
          # stable run then rebuilds rc artifacts and fails uploading them onto
          # the existing rc release (observed on the first v0.1.0 attempt).
          GORELEASER_CURRENT_TAG: ${{ github.ref_name }}
          # Dormant notarization (P4-SEC-05 remainder): the validation step
          # above rejects partial configuration, so set all five secrets at
          # once. .goreleaser.yaml still self-enables via isEnvSet on
          # MACOS_SIGN_P12. This Ubuntu job cannot run macOS spctl; the
          # required post-release Gatekeeper check is in RELEASING.md.
          MACOS_SIGN_P12: ${{ secrets.MACOS_SIGN_P12 }}
          MACOS_SIGN_PASSWORD: ${{ secrets.MACOS_SIGN_PASSWORD }}
          MACOS_NOTARY_KEY: ${{ secrets.MACOS_NOTARY_KEY }}
          MACOS_NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          MACOS_NOTARY_ISSUER_ID: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
      - name: Publish release candidate
        if: steps.release-mode.outputs.stable != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" --draft=false
      - name: Upload staged release metadata
        if: steps.release-mode.outputs.stable == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: stable-release-metadata
          path: |
            dist/homebrew/*
            dist/checksums.txt
          if-no-files-found: error
      - name: Compute provenance subjects
        id: hash
        # checksums.txt is already in sha256sum format — exactly the subjects
        # file the SLSA generic generator expects, base64-encoded.
        run: echo "hashes=$(base64 -w0 dist/checksums.txt)" >> "$GITHUB_OUTPUT"

  provenance:
    name: SLSA provenance
    needs: goreleaser
    permissions:
      actions: read # read the workflow run to record the builder
      id-token: write # sign the provenance via Fulcio (keyless)
      contents: write # upload multiple.intoto.jsonl to the release
    # NOTE: this reusable workflow MUST be referenced by TAG, not SHA —
    # slsa-verifier resolves the builder identity from the tag, and the
    # generator refuses to run from an unexpected ref. Exempt from the repo's
    # SHA-pin convention (P4-SEC-05) for that reason; do not "fix" this in a
    # future pin sweep.
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: ${{ needs.goreleaser.outputs.hashes }}
      upload-assets: true
      # The generator's tagged reusable workflow supports attaching assets to
      # an existing draft. Preserve the stable draft until native smoke passes.
      # The reusable workflow declares this input `type: string` with tri-state
      # semantics: 'true' marks the release draft, any other NON-EMPTY value
      # un-drafts it, and EMPTY leaves an existing release's draft flag alone —
      # so stable passes 'true' and rc passes empty (its release is already
      # published by the rc step above and must not be touched).
      draft-release: ${{ needs.goreleaser.outputs.stable == 'true' && 'true' || '' }}

  stable-smoke:
    name: Smoke staged stable artifacts (${{ matrix.os }})
    needs: [goreleaser, provenance]
    if: needs.goreleaser.outputs.stable == 'true'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    permissions:
      contents: write # gh release download needs write access to see a still-draft release; read-only 404s on it
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: sigstore/cosign-installer@f713795cb21599bc4e5c4b58cbad1da852d7eeb9 # v3
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: false
      - name: Install slsa-verifier
        env:
          GOBIN: ${{ runner.temp }}/bin
        run: |
          go install github.com/slsa-framework/slsa-verifier/v2/cli/slsa-verifier@v2.7.1
          echo "$GOBIN" >> "$GITHUB_PATH"
      # The write-capable GH_TOKEN (needed only to see a still-draft release,
      # see the job permissions comment above) is scoped to this download step
      # alone. Every later step is token-free, and nothing downloaded executes
      # until the cosign + SLSA verification steps below have both passed.
      - name: Download staged release
        id: download
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -Eeuo pipefail
          trap 'rc=$?; failed_command=$BASH_COMMAND; echo "::error::command failed at line $LINENO (exit $rc): $failed_command"; echo "::group::downloaded assets"; find . -maxdepth 2 -type f -print | sort; echo "::endgroup::"; exit "$rc"' ERR

          # Downloading a still-draft release requires a token with write (push)
          # access - a read-only token 404s on it even though the draft exists.
          gh release download "$TAG" --repo "$GITHUB_REPOSITORY" --pattern '*'

          version=${TAG#v}
          case "$(uname -s)" in
            Linux) artifact_os=linux ;;
            Darwin) artifact_os=darwin ;;
            *) echo "unsupported smoke OS: $(uname -s)" >&2; exit 1 ;;
          esac
          case "$(uname -m)" in
            x86_64|amd64) artifact_arch=amd64 ;;
            arm64|aarch64) artifact_arch=arm64 ;;
            *) echo "unsupported smoke architecture: $(uname -m)" >&2; exit 1 ;;
          esac
          archive="devstrap_${version}_${artifact_os}_${artifact_arch}.tar.gz"
          test -f "$archive"
          echo "archive=$archive" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Verify checksums, SBOM, and completions
        env:
          ARCHIVE: ${{ steps.download.outputs.archive }}
        run: |
          set -Eeuo pipefail
          trap 'rc=$?; failed_command=$BASH_COMMAND; echo "::error::command failed at line $LINENO (exit $rc): $failed_command"; echo "::group::downloaded assets"; find . -maxdepth 2 -type f -print | sort; echo "::endgroup::"; exit "$rc"' ERR

          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum --ignore-missing -c checksums.txt
          else
            # macOS provides shasum rather than GNU coreutils by default. All
            # release assets are present, so no ignore-missing mode is needed.
            shasum -a 256 -c checksums.txt
          fi
          for candidate in devstrap_*.tar.gz; do
            test -f "${candidate}.sbom.json"
          done
          archive_contents=$(tar -tzf "$ARCHIVE")
          grep -Eq '(^|/)completions/devstrap\.bash$' <<<"$archive_contents"
          grep -Eq '(^|/)completions/_devstrap$' <<<"$archive_contents"
          grep -Eq '(^|/)completions/devstrap\.fish$' <<<"$archive_contents"

      - name: Verify cosign signature and SLSA provenance
        env:
          ARCHIVE: ${{ steps.download.outputs.archive }}
          TAG: ${{ github.ref_name }}
        run: |
          set -Eeuo pipefail
          trap 'rc=$?; failed_command=$BASH_COMMAND; echo "::error::command failed at line $LINENO (exit $rc): $failed_command"' ERR

          cosign verify-blob checksums.txt \
            --bundle checksums.txt.sigstore.json \
            --certificate-identity "https://github.com/Reederey87/DevStrap/.github/workflows/release.yml@refs/tags/$TAG" \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com
          slsa-verifier verify-artifact "$ARCHIVE" \
            --provenance-path multiple.intoto.jsonl \
            --source-uri github.com/Reederey87/DevStrap \
            --source-tag "$TAG"

      # Only reached once checksums, SBOM presence, completions, the cosign
      # signature, and SLSA provenance have all verified — nothing downloaded
      # executes before it is fully verified.
      - name: Extract and smoke-test the verified binary
        env:
          ARCHIVE: ${{ steps.download.outputs.archive }}
          VERSION: ${{ steps.download.outputs.version }}
        run: |
          set -Eeuo pipefail
          trap 'rc=$?; failed_command=$BASH_COMMAND; echo "::error::command failed at line $LINENO (exit $rc): $failed_command"' ERR

          mkdir native
          tar -xzf "$ARCHIVE" -C native
          version_output=$(./native/devstrap version)
          printf '%s\n' "$version_output"
          grep -F "$VERSION" <<<"$version_output"
          grep -F "$GITHUB_SHA" <<<"$version_output"
          grep -Eq '[0-9]{4}-[0-9]{2}-[0-9]{2}' <<<"$version_output"

  stable-publish:
    name: Publish smoked stable release
    needs: [goreleaser, stable-smoke]
    if: needs.goreleaser.outputs.stable == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    # Serialize tap pushes across ALL release runs (two different stable tags
    # would otherwise race the shared tap branch).
    concurrency:
      group: homebrew-tap-publish
      cancel-in-progress: false
    steps:
      # Every fallible preparation happens BEFORE the user-visible draft flip:
      # a failure here leaves a consistent, still-draft release instead of a
      # published version whose tap never updated.
      - name: Verify the draft is the run that was smoked
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -Eeuo pipefail
          tag_sha=$(gh api "repos/$GITHUB_REPOSITORY/commits/$TAG" --jq '.sha')
          is_draft=$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json isDraft --jq '.isDraft')
          if [[ "$tag_sha" != "$GITHUB_SHA" || "$is_draft" != "true" ]]; then
            echo "::error::tag $TAG currently resolves to commit $tag_sha (release isDraft=$is_draft), expected commit $GITHUB_SHA with isDraft=true — a re-cut tag or concurrent run replaced the smoked draft; refusing to publish"
            exit 1
          fi
      - name: Download staged cask
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: stable-release-metadata
          path: staged
      - name: Prepare tap checkout
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
        run: |
          set -Eeuo pipefail
          cask=$(find staged -type f -path '*/Casks/devstrap.rb' -print -quit)
          test -n "$cask"
          gh auth setup-git
          gh repo clone Reederey87/homebrew-devstrap tap
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" --draft=false --latest
      - name: Push staged cask to Homebrew tap
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -Eeuo pipefail
          cask=$(find staged -type f -path '*/Casks/devstrap.rb' -print -quit)
          if cmp -s "$cask" tap/Casks/devstrap.rb; then
            echo "Homebrew cask is already current; skipping commit"
            exit 0
          fi
          cp "$cask" tap/Casks/devstrap.rb
          git -C tap config user.name github-actions[bot]
          git -C tap config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git -C tap add Casks/devstrap.rb
          git -C tap commit -m "devstrap $TAG"
          git -C tap push origin HEAD:main
