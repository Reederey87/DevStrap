version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - gosec
    - govet
    - ineffassign
    - staticcheck
    - unconvert
    - errorlint
    # P4-QUAL-07: resource/leak linters. bodyclose catches unclosed HTTP bodies;
    # sqlclosecheck catches unclosed sql.Rows/Stmt. contextcheck verifies callers
    # thread a caller-supplied context instead of context.Background() (the
    # forge-resolution chain and editor launch were threaded to satisfy it).
    - bodyclose
    - sqlclosecheck
    - contextcheck
  settings:
    gosec: {} # TEST-04: no includes allowlist — run all default gosec rules
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - gosec
          # Test helpers legitimately create fresh root contexts
          # (context.Background()); there is no caller context to inherit.
          - contextcheck
      # P4-QUAL-07: the one known cobra false positive (Execute(ctx) ->
      # SetContext(ctx) -> cmd.Context() inheritance that contextcheck cannot
      # trace) is suppressed with a line-scoped //nolint:contextcheck on the
      # NewRootCommand call in root.go's Execute, NOT a file-wide exclude-rule —
      # a path rule here would also mask genuine context-misuse anywhere else in
      # root.go (e.g. openState's state.Open(ctx, ...)).

issues:
  max-same-issues: 0
  max-issues-per-linter: 0
