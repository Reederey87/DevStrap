version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - gosec
    - govet
    - ineffassign
    - staticcheck
    - unconvert
    - errorlint
    # P4-QUAL-07: resource/leak linters. bodyclose catches unclosed HTTP bodies;
    # sqlclosecheck catches unclosed sql.Rows/Stmt. contextcheck verifies callers
    # thread a caller-supplied context instead of context.Background() (the
    # forge-resolution chain and editor launch were threaded to satisfy it).
    - bodyclose
    - sqlclosecheck
    - contextcheck
  settings:
    gosec: {} # TEST-04: no includes allowlist — run all default gosec rules
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - gosec
          # Test helpers legitimately create fresh root contexts
          # (context.Background()); there is no caller context to inherit.
          - contextcheck
      # P4-QUAL-07 false positive, NOT a blanket suppression. Context IS
      # correctly propagated per-command: Execute(ctx) calls root.SetContext(ctx),
      # and every RunE sources its context from cmd.Context() (verified in
      # init.go). contextcheck cannot trace inheritance through cobra's
      # SetContext/cmd.Context() indirection, so it flags NewRootCommand (built
      # without a ctx param) as failing to pass the context. Scoped to this one
      # known linter/framework interaction at the command-tree root.
      - path: internal/cli/root\.go
        linters:
          - contextcheck

issues:
  max-same-issues: 0
  max-issues-per-linter: 0
