version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - gosec
    - govet
    - ineffassign
    - staticcheck
    - unconvert
    - errorlint
  settings:
    gosec: {} # TEST-04: no includes allowlist — run all default gosec rules
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - gosec

issues:
  max-same-issues: 0
  max-issues-per-linter: 0
